services:
  # SearXNG metasearch engine
  searxng:
    build:
      context: .
      dockerfile: Dockerfile.searxng
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8082
    networks:
      - searxng-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MCP Server for SearXNG
  mcp-searxng:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mcp-searxng
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - SEARXNG_DEFAULT_RESULTS=10
      - SEARXNG_TIMEOUT=10
    depends_on:
      searxng:
        condition: service_healthy
    networks:
      - searxng-network

networks:
  searxng-network:
    driver: bridge