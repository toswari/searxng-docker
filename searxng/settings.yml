# SearXNG configuration with JSON output enabled
use_default_settings: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "changeme123456789012345678901234567890"

search:
  safe_search: 0
  autocomplete: ""
  default_timeout: 10
  formats:
    - html
    - json
    - csv
    - rss

ui:
  default_theme: simple

# Engine configuration - override defaults to disable problematic engines
# By setting engine to null or removing the engine file reference, we avoid loading errors
engines:
  # Working engines
  - name: google
    engine: google
    shortcut: go
    time_between_searches: 2.0

  - name: bing
    engine: bing
    shortcut: bi
    time_between_searches: 2.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    time_between_searches: 2.0

  - name: brave
    engine: brave
    shortcut: brave
    time_between_searches: 5.0

  - name: wikipedia
    engine: wikipedia
    shortcut: wp

  - name: github
    engine: github
    shortcut: gh

  - name: arxiv
    engine: arxiv
    shortcut: arx

  # Override problematic engines to use a simple disabled config
  - name: ahmia
    disabled: true
  - name: stackoverflow
    disabled: true
  - name: torch
    disabled: true
  - name: wikidata
    disabled: true
  - name: karmasearch
    disabled: true
  - name: yahoo news
    disabled: true
  - name: brave news
    disabled: true
  - name: brave images
    disabled: true
  - name: brave videos
    disabled: true